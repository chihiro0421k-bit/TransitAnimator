<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TransitAnimator</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{
    width:100%;
    height:100%;
    margin:0;
}

#map{
    width:100%;
    height:100%;
}

#controls{
    position:absolute;
    z-index:1000;
    background:white;
    padding:10px;
    left:10px;
    top:10px;
    width:250px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

#routeInput{
    width:100%;
    height:120px;
    resize:none;
    font-size:16px;
}

#drawButton{
    margin-top:10px;
    width:100%;
    height:40px;
    font-size:16px;
}
</head>

<body>

<div id="controls">
<textarea id="routeInput">福知山
園部
京都
大阪</textarea>

<br>

<button id="drawButton">経路を描画</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>

</body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>

</body>
</html>
