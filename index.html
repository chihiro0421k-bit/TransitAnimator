<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transit Animator</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#f2f2f2;
}

header{
    background:#1565c0;
    color:white;
    padding:15px;
    font-size:24px;
}

#controls{
    padding:15px;
}

textarea{
    width:100%;
    height:120px;
    font-size:16px;
}

button{
    margin-top:10px;
    padding:10px 20px;
    font-size:18px;
}

svg{
    width:100%;
    height:500px;
    background:white;
    border-top:1px solid #ccc;
}

.station{
    fill:black;
}

.line{
    stroke:#888;
    stroke-width:6;
}

.train{
    font-size:22px;
}
</style>

</head>
<body>

<header>
Transit Animator
</header>

<div id="controls">

<textarea id="route">
福知山
園部
京都
大阪
</textarea>

<br>

<button onclick="play()">▶ 再生</button>

</div>

<svg id="map" viewBox="0 0 1000 300">

<line class="line"
x1="100"
y1="150"
x2="900"
y2="150"/>

<circle class="station" cx="100" cy="150" r="6"/>
<circle class="station" cx="350" cy="150" r="6"/>
<circle class="station" cx="600" cy="150" r="6"/>
<circle class="station" cx="900" cy="150" r="6"/>

<text x="70" y="180">福知山</text>
<text x="320" y="180">園部</text>
<text x="575" y="180">京都</text>
<text x="875" y="180">大阪</text>

<text id="train"
class="train"
x="90"
y="140">
🚆
</text>

</svg>

<script>

const train=document.getElementById("train");

function play(){

let start=null;

function animate(time){

if(!start) start=time;

let progress=(time-start)/6000;

if(progress>1) progress=1;

let x=90+800*progress;

train.setAttribute("x",x);

if(progress<1){
requestAnimationFrame(animate);
}

}

requestAnimationFrame(animate);

}

</script>

</body>
</html>
